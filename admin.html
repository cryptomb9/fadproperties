<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/png" href="/images/favicon.png" />
  <link rel="apple-touch-icon" href="/images/favicon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <title>Admin - FAD HOMES AND PROPERTY</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
</head>
<body class="admin-body">
  <header class="header">
    <nav class="navbar">
      <div class="logo">
        <img src="images/faflogo.png" alt="FAD HOMES AND PROPERTY Logo" />
        <a href="/" class="brand-copy">FAD HOMES AND PROPERTY<span>Admin studio</span></a>
      </div>
      <ul class="links">
        <li><a href="/" class="nav-btn">Home</a></li>
        <li><a href="/properties" class="nav-btn">Properties</a></li>
        <li><a href="/lands" class="nav-btn">Land</a></li>
        <li><a href="/#services" class="nav-btn">Services</a></li>
        <li><a href="/#work" class="nav-btn">Projects</a></li>
        <li><a href="/about" class="nav-btn">About Us</a></li>
        <li><a href="/contact" class="nav-btn">Contact</a></li>
        <li><button id="logoutBtn" class="nav-btn nav-strong" type="button" style="display:none;">Logout</button></li>
      </ul>
    </nav>
  </header>

  <main class="admin-shell">
    <section class="admin-login-panel" id="adminLoginPanel">
      <div class="admin-panel">
        <p class="eyebrow">Admin access</p>
        <h1>Sign in</h1>
        <form id="admin-login-form">
          <input type="email" placeholder="Email" required />
          <input type="password" placeholder="Password" required />
          <button type="submit">Login</button>
          <p id="error-message" style="display:none;">Invalid email or password</p>
        </form>
      </div>
    </section>

    <div id="adminDashboard" style="display:none;">
    <div class="admin-topbar">
      <div>
        <p class="eyebrow">Company operations</p>
        <h1>Admin studio</h1>
      </div>
      <a href="/" class="secondary-btn" style="color:#111;border-color:var(--line);background:#fff;">View site</a>
    </div>

    <section class="admin-stats" aria-label="Property summary">
      <button class="admin-stat is-active" type="button" data-inventory-filter="all"><strong id="totalListings">0</strong><span>All listings</span></button>
      <button class="admin-stat" type="button" data-inventory-filter="property"><strong id="totalProperties">0</strong><span>Properties</span></button>
      <button class="admin-stat" type="button" data-inventory-filter="land"><strong id="totalLands">0</strong><span>Land</span></button>
      <button class="admin-stat" type="button" data-inventory-filter="available"><strong id="availableProperties">0</strong><span>Available</span></button>
      <button class="admin-stat" type="button" data-inventory-filter="sold"><strong id="soldProperties">0</strong><span>Sold</span></button>
    </section>

    <div class="admin-grid">
      <div>
        <section class="admin-panel">
          <h2>Post a Property</h2>
          <form id="propertyForm">
            <input type="text" id="title" placeholder="Property title" required />
            <input type="text" id="location" placeholder="Location, e.g. Magodo, Ikeja, Mowe" required />
            <select id="category" required>
              <option value="">Select property type</option>
              <option value="Apartment">Apartment</option>
              <option value="Duplex">Duplex</option>
              <option value="Detached Duplex">Detached Duplex</option>
              <option value="Semi Detached Duplex">Semi Detached Duplex</option>
              <option value="Terrace Duplex">Terrace Duplex</option>
              <option value="Bungalow">Bungalow</option>
              <option value="Shortlet">Shortlet</option>
              <option value="Commercial">Commercial</option>
            </select>
            <div class="form-row">
              <input type="number" id="bedrooms" placeholder="Bedrooms" min="0" />
              <input type="number" id="bathrooms" placeholder="Bathrooms" min="0" />
            </div>
            <textarea id="description" placeholder="Description, location, rooms, inspection notes" rows="4" required></textarea>
            <input type="text" id="price" placeholder="Price, e.g. 45,000,000" required />
            <input type="file" id="media" accept="image/*,video/*" multiple required />
            <button type="submit">Publish Property</button>
          </form>
        </section>

        <section class="admin-panel" style="margin-top:22px;">
          <h2>Post Land</h2>
          <form id="landForm">
            <input type="text" id="landTitle" placeholder="Land title, e.g. 2 plots in Mowe" required />
            <input type="text" id="landLocation" placeholder="Location" required />
            <input type="text" id="landCategory" placeholder="Document/title, e.g. C of O, Excision, Gazette" required />
            <input type="text" id="landSize" placeholder="Land size, e.g. 300 sqm, 500 sqm, 1 plot, 2 acres" required />
            <textarea id="landDescription" placeholder="Description, size, estate details, access road, inspection notes" rows="4" required></textarea>
            <input type="text" id="landPrice" placeholder="Amount, e.g. 12,000,000" required />
            <input type="file" id="landMedia" accept="image/*,video/*" multiple />
            <button type="submit">Publish Land</button>
          </form>
        </section>

        <section class="admin-panel" style="margin-top:22px;">
          <h2>Promotion Popup</h2>
          <form id="promoForm">
            <input type="file" id="promoImage" accept="image/*" required/>
            <button type="submit">Upload Promo</button>
          </form>
          <div id="promo-container"></div>
        </section>
      </div>

      <section class="admin-panel" id="propertiesList">
        <h2>Property Inventory</h2>
        <div class="inventory-tools">
          <input type="search" id="inventorySearch" placeholder="Search by property ID, title, or location" />
          <button type="button" id="clearInventorySearch">Clear</button>
        </div>
        <div id="properties-container" class="properties-list"></div>
      </section>
    </div>
    </div>
  </main>

  <div class="modal" id="editListingModal">
    <div class="modal-content admin-edit-modal">
      <span class="close-btn" id="closeEditModal">&times;</span>
      <h2>Edit Listing</h2>
      <form id="editListingForm">
        <input type="hidden" id="editId" />
        <select id="editListingType" required>
          <option value="property">Property</option>
          <option value="land">Land</option>
        </select>
        <input type="text" id="editTitle" placeholder="Title" required />
        <input type="text" id="editLocation" placeholder="Location" required />
        <input type="text" id="editCategory" placeholder="Property type or land document/title" required />
        <input type="text" id="editSize" placeholder="Land size, if applicable" />
        <div class="form-row">
          <input type="number" id="editBedrooms" placeholder="Bedrooms" min="0" />
          <input type="number" id="editBathrooms" placeholder="Bathrooms" min="0" />
        </div>
        <textarea id="editDescription" placeholder="Description" rows="5" required></textarea>
        <input type="text" id="editPrice" placeholder="Price" required />
        <select id="editStatus" required>
          <option value="Available">Available</option>
          <option value="Sold">Sold</option>
        </select>
        <select id="editMediaMode">
          <option value="keep">Keep existing media</option>
          <option value="add">Add uploaded media</option>
          <option value="replace">Replace with uploaded media</option>
        </select>
        <input type="file" id="editMedia" accept="image/*,video/*" multiple />
        <button type="submit">Save Changes</button>
        <p id="edit-message" class="form-note" style="display:none;"></p>
      </form>
    </div>
  </div>

  <script type="module" src="admin.js"></script>
</body>
</html>
